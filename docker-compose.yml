services:
  # Backend: FastAPI + Agent orchestration
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: agentic-seller-backend
    ports:
      - "8000:8000"
    environment:
      # LM Studio Configuration (runs on host machine)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-local-model}
      - OPENAI_MODEL=${OPENAI_MODEL:-google/gemma-4-e4b}
      - LOCAL_MODEL_API=${LOCAL_MODEL_API:-http://host.docker.internal:1234/v1}
      # Other settings
      - DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-PLN}
      - POST_MODE=${POST_MODE:-dry_run}
      - HEADLESS=${HEADLESS:-true}
      - ENABLE_OLX=${ENABLE_OLX:-true}
      - ENABLE_FACEBOOK=${ENABLE_FACEBOOK:-true}
      - USER_DATA_DIR=/app/data/browser_profiles
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
    volumes:
      # Persistent volume for agent state, browser profiles, and results
      - agentic_data:/app/data
    networks:
      - agentic-network
    # Allow container to access host's localhost (for LM Studio)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend: Streamlit dashboard
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agentic-seller-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_LOGGER_LEVEL=warning
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  # Persistent volume for SQLite db, browser profiles, and job results
  agentic_data:
    driver: local

networks:
  agentic-network:
    driver: bridge
